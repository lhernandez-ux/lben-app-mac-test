version: 2.1

jobs:
  build-mac-intel:
    macos:
      xcode: "15.0"
    resource_class: macos.x86.medium.gen2
    steps:
      - checkout

      - run:
          name: Set up Python
          command: |
            brew install python@3.11
            python3.11 -m pip install --upgrade pip

      - run:
          name: Install dependencies
          command: |
            python3.11 -m pip install pyinstaller
            python3.11 -m pip install -r requirements.txt

      - run:
          name: Parche scipy
          command: |
            python3.11 - \<<'EOF'
            import scipy.stats._distn_infrastructure as f
            import pathlib
            path = pathlib.Path(f.__file__)
            code = path.read_text()
            old = (
                "for obj in [s for s in dir() if s.startswith('_doc_')]:\n"
                "    exec('del ' + obj)\n"
                "del obj"
            )
            new = (
                "for obj in [s for s in dir() if s.startswith('_doc_')]:\n"
                "    exec('del ' + obj)\n"
                "try:\n"
                "    del obj\n"
                "except NameError:\n"
                "    pass"
            )
            if old in code:
                path.write_text(code.replace(old, new))
                print("Parche aplicado OK")
            else:
                print("No necesito parche")
            EOF

      - run:
          name: Build con PyInstaller
          command: |
            python3.11 -m PyInstaller \
              --name "LBEn_App" \
              --windowed \
              --clean \
              --collect-all scipy \
              --collect-all statsmodels \
              --add-data "assets:assets" \
              --add-data "data:data" \
              main.py

      - run:
          name: Crear .dmg
          command: |
            python3.11 -m pip install dmgbuild
            python3.11 -m dmgbuild -s dmg_settings.py "LBEn App" LBEn_App.dmg

      - store_artifacts:
          path: LBEn_App.dmg
          destination: LBEn_App-intel.dmg

workflows:
  build:
    jobs:
      - build-mac-intel